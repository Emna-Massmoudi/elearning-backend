spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5433/elearning_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.jakarta.persistence.query.timeout=5000
server.address=0.0.0.0
server.port=${PORT:8081}
spring.application.name=elearning-api
spring.datasource.hikari.connection-timeout=30000
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
upload.dir=uploads
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG